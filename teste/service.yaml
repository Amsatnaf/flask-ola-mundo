#OKE
apiVersion: v1
kind: Service
metadata:
  name: flask-web #Nome interno
  namespace: flask-prod
spec:
  type: ClusterIP   # IMPORTANTE: Na OKE com Ingress, use ClusterIP, não LoadBalancer
  selector:
    app: flask-web    # Tem que bater com o label do seu Pod/Deployment
  ports:
    - port: 80      # Porta que o Ingress vai chamar
      targetPort: 80 # Porta que seu container escuta
