
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-web
  namespace: flask-prod
  annotations:
    # (opcional) força o upstream para a porta correta quando usa nome
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
  - host: flask-web.143.47.111.15.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: flask-web
            port:
              number: 80   # tem que ser 80 (o "port" do Service), não 8080
